<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core Debug | @intl-phone-js/core</title>
    <script>
      (() => {
        const path = window.location.pathname;
        const hasExtension = /\.[a-z0-9]+$/i.test(path);
        const baseHref = hasExtension
          ? path.slice(0, path.lastIndexOf("/") + 1)
          : path.endsWith("/")
            ? path
            : `${path}/`;
        const base = document.createElement("base");
        base.href = baseHref;
        document.head.appendChild(base);
      })();
    </script>
    <script src="../assets/redirect.js"></script>
    <script src="../assets/theme-init.js"></script>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body
    data-page-title="Core Debug"
    data-page-description="Inspect IntlPhoneCore state and run core operations manually."
  >
    <main>
      <section class="hero">
        <h2>Headless Core Inspector</h2>
        <p>Run core methods manually and inspect state snapshots.</p>
      </section>

      <section class="panel">
        <div class="row">
          <label for="allowed-input">Allowed Countries (comma separated, e.g. BR,US)</label>
          <input id="allowed-input" type="text" placeholder="BR,US" />
        </div>

        <div
          class="row"
          style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.75rem;"
        >
          <button id="apply-config" type="button">Apply Config</button>
          <button id="clear-config" type="button">Clear Config</button>
        </div>
      </section>

      <section class="panel">
        <h3>Actions</h3>
        <div id="actions" style="display: flex; gap: 0.75rem; flex-wrap: wrap;"></div>
      </section>

      <section id="container-output" class="panel"></section>
    </main>

    <script type="module">
      import { bootDocsPage } from "../assets/page.js";
      bootDocsPage();
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
