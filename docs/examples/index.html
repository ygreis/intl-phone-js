    <script>
      (() => {
        const path = window.location.pathname;
        const hasExtension = /\.[a-z0-9]+$/i.test(path);
        const baseHref = hasExtension
          ? path.slice(0, path.lastIndexOf("/") + 1)
          : path.endsWith("/")
            ? path
            : `${path}/`;
        const base = document.createElement("base");
        base.href = baseHref;
        document.head.appendChild(base);
      })();
    </script>
