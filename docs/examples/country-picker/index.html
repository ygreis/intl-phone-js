<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Picker Example | @intl-phone-js/core</title>
    <script>
      (() => {
        const path = window.location.pathname;
        const hasExtension = /\.[a-z0-9]+$/i.test(path);
        const baseHref = hasExtension
          ? path.slice(0, path.lastIndexOf("/") + 1)
          : path.endsWith("/")
            ? path
            : `${path}/`;
        const base = document.createElement("base");
        base.href = baseHref;
        document.head.appendChild(base);
      })();
    </script>
    <script src="../assets/redirect.js"></script>
    <script src="../assets/theme-init.js"></script>
    <link rel="stylesheet" href="../assets/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tom-select/2.4.3/css/tom-select.min.css"
    />
  </head>
  <body
    data-page-title="Country Picker"
    data-page-description="Search countries by name, ISO code, or DDI and keep the selector synced with the detected phone country."
  >
    <main>
      <section class="hero">
        <h2>Searchable country selector</h2>
        <p>Pick a country manually or let the phone input detect it and update the selector automatically.</p>
      </section>

      <section class="panel country-picker-shell">
        <div class="row">
          <label for="intl-phone-js">Phone Input</label>
          <div class="country-picker-field">
            <button
              id="country-picker-trigger"
              type="button"
              class="country-picker-trigger is-empty"
              aria-label="Choose country"
              aria-expanded="false"
            >
              <span id="country-picker-flag" class="country-picker-trigger-flag">&#127757;</span>
              <span class="country-picker-trigger-caret"></span>
            </button>
            <input id="intl-phone-js" type="text" placeholder="Type: 5511999999999" />
            <div id="country-picker-panel" class="country-picker-panel" hidden>
              <select id="country-picker" placeholder="Search by name, ISO, or DDI"></select>
            </div>
          </div>
        </div>

        <p id="country-meta" class="country-picker-meta">No country selected.</p>
      </section>

      <section class="panel">
        <h2>Copy and paste</h2>
        <p>Use the snippets below in your own project.</p>
        <div id="snippet-list" class="code-snippet-list"></div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tom-select/2.4.3/js/tom-select.complete.min.js"></script>
    <script type="module">
      import { bootDocsPage } from "../assets/page.js";
      bootDocsPage();
    </script>
    <script type="module" src="./index.js"></script>
  </body>
</html>
