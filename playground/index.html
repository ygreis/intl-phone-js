<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intl Phone Playground</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 24px;
        max-width: 800px;
        margin: auto;
      }

      input,
      textarea {
        padding: 8px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
      }

      textarea {
        resize: vertical;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }

      .card {
        margin-top: 16px;
        padding: 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
      }

      pre {
        background: #f0f0f0;
        padding: 12px;
        border-radius: 6px;
        overflow: auto;
      }

      .config-section {
        margin-top: 24px;
      }

      label {
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h2>📱 IntlPhone Playground</h2>

    <input type="text" id="intl-phone-js" placeholder="Digite o telefone..." />

    <div class="config-section">
      <h3>⚙️ Configurações</h3>

      <label>Allowed Countries (ex: BR,US,CA)</label>
      <input type="text" id="allowed-input" />

      <br /><br />

      <button id="apply-config">Aplicar Config</button>
    </div>

    <div id="container-output" class="card"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
