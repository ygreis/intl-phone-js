<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntlPhoneCore Playground</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 24px;
        max-width: 900px;
        margin: auto;
        line-height: 1.5;
      }

      h2,
      h3 {
        margin-bottom: 12px;
      }

      input,
      textarea {
        padding: 10px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      textarea {
        resize: vertical;
      }

      button {
        padding: 10px 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: white;
      }

      button:hover {
        background: #f5f5f5;
      }

      .card {
        margin-top: 16px;
        padding: 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
      }

      .section {
        margin-top: 24px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      pre {
        background: #f0f0f0;
        padding: 12px;
        border-radius: 6px;
        overflow: auto;
        font-size: 13px;
      }

      label {
        font-weight: bold;
        display: block;
        margin-bottom: 6px;
      }

      .muted {
        color: #666;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <h2>📱 IntlPhoneCore Playground</h2>
    <p class="muted">Manual debug page for the headless core.</p>

    <div class="section">
      <h3>⚙️ Config</h3>

      <label for="allowed-input">Allowed Countries (example: BR,US,CA)</label>
      <input type="text" id="allowed-input" placeholder="BR,US,CA" />

      <div class="actions">
        <button id="apply-config">Apply config</button>
        <button id="clear-config">Clear config</button>
      </div>
    </div>

    <div id="container-output" class="card"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
